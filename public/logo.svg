  <line x1="341" y1="8" x2="341" y2="76" stroke="currentColor" stroke-width="4"/>

  <!-- "INFLU" -->
  <text x="0" y="148" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="78" fill="currentColor" letter-spacing="-2">INFLU</text>

  <!-- "E" -->
  <text x="233" y="148" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="78" fill="currentColor" letter-spacing="-2">EN</text>

  <!-- "C" with circle -->
  <circle cx="348" cy="124" r="32" stroke="currentColor" stroke-width="5" fill="none"/>
  <text x="323" y="148" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="78" fill="currentColor" letter-spacing="-2">C</text>

  <!-- "E" final -->
  <text x="360" y="148" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="78" fill="currentColor" letter-spacing="-2">E</text>
