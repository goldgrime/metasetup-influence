<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" fill="none">
  <!-- "A" -->
  <text x="0" y="72" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="78" fill="currentColor" letter-spacing="-2">A</text>

  <!-- "R" with circle -->
  <circle cx="88" cy="48" r="32" stroke="currentColor" stroke-width="5" fill="none"/>
  <text x="68" y="72" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="78" fill="currentColor" letter-spacing="-2">R</text>

  <!-- "TIST" -->
  <text x="120" y="72" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="78" fill="currentColor" letter-spacing="-2">TIST</text>

  <!-- Barcode lines -->
  <line x1="295" y1="8" x2="295" y2="76" stroke="currentColor" stroke-width="4"/>
  <line x1="303" y1="8" x2="303" y2="76" stroke="currentColor" stroke-width="3"/>
  <line x1="310" y1="8" x2="310" y2="76" stroke="currentColor" stroke-width="4"/>
  <line x1="317" y1="16" x2="317" y2="76" stroke="currentColor" stroke-width="3"/>
  <line x1="323" y1="8" x2="323" y2="76" stroke="currentColor" stroke-width="4"/>
  <line x1="330" y1="8" x2="330" y2="76" stroke="currentColor" stroke-width="2"/>
